spring:
  application:
    name: lee2

  datasource:
    url: jdbc:h2:file:./data/lee2-db;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: sa

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: never
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql

  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true

app:
  name: "Lee Service v2"